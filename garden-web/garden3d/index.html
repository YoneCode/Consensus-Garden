  for(const k of koiList){k.ph+=k.sp*dt;const x=POND.x+Math.cos(k.ph)*k.r,z=POND.z+Math.sin(k.ph)*k.r*0.75;

  for(const F of flyers){F.ph+=F.sp*dt*60;const x=Math.cos(F.ph)*F.r,z=Math.sin(F.ph)*F.r;
    const vx=-Math.sin(F.ph)*F.sp,vz=Math.cos(F.ph)*F.sp;F.holder.position.set(x,F.h,z);
    F.holder.rotation.y=Math.atan2(-vz,vx)+F.yaw;F.mixer.update(dt);F.holder.visible=nightAmt<0.5}
  for(const f of flutterList){f.ph+=dt;f.g.position.set(f.bx+Math.sin(f.ph*0.7)*3,0.8+Math.sin(f.ph*2)*0.4,f.bz+Math.cos(f.ph*0.5)*3);
    const fl=Math.sin(now*0.02)*0.9;f.wl.rotation.y=fl;f.wr.rotation.y=-fl;f.g.rotation.y+=dt*0.6;f.g.visible=nightAmt<0.5}
  const fp=ffGeo.attributes.position;for(let i=0;i<FFN;i++){fp.array[i*3]=ffBase[i*3]+Math.sin(now*0.0006+i)*1.2;
    fp.array[i*3+1]=ffBase[i*3+1]+Math.sin(now*0.0011+i*1.7)*0.5;fp.array[i*3+2]=ffBase[i*3+2]+Math.cos(now*0.0007+i*2.1)*1.2}
  fp.needsUpdate=true;ffMat.opacity=nightAmt*(0.55+0.45*Math.sin(now*0.004));
  if(grassShader)grassShader.uniforms.uTime.value=now*0.001;
  updateAnimals(dt,now);
  updateKeepers(dt,now);
}

/* ════════ first-person controls (pointer lock) ════════ */
const EYE=1.6;
let walkY=0;
let yaw=Math.PI, pitch=0;
camera.position.set(0,EYE,19);
const keys={};
addEventListener('keydown',e=>{keys[e.code]=true});
addEventListener('keyup',e=>{keys[e.code]=false});
const intro=document.getElementById('intro'),hud=document.getElementById('hud'),xh=document.getElementById('xhair');
function enter(){canvas.requestPointerLock&&canvas.requestPointerLock()}
document.querySelector('.enter').addEventListener('click',e=>{e.stopPropagation();enter()});
intro.addEventListener('click',enter);
document.addEventListener('pointerlockchange',()=>{const locked=document.pointerLockElement===canvas;
  intro.classList.toggle('hidden',locked);hud.classList.toggle('on',locked);xh.classList.toggle('on',locked)});
addEventListener('mousemove',e=>{if(document.pointerLockElement!==canvas)return;
  yaw-=e.movementX*0.0022; pitch=Math.max(-1.2,Math.min(1.2,pitch-e.movementY*0.0022))});
function blocked(x,z){if(Math.hypot(x,z)>ROAM)return true;const onB=onBridge(x,z);
  for(const c of colliders){if(onB&&c.water)continue;const dx=x-c.x,dz=z-c.z;if(dx*dx+dz*dz<c.r*c.r)return true}return false}
/* ── press E: inspect the nearest tree (live on-chain GenLayer data) ── */
const inspectEl=document.getElementById('inspect'),ehintEl=document.getElementById('ehint');
const SPN=['MAPLE','SAKURA','PINE','EMBER','FROST'];
function nearestToken(){let best=null,bd=4.0;for(const p of plantedTokens){const d=Math.hypot(camera.position.x-p.x,camera.position.z-p.z);if(d<bd){bd=d;best=p;}}return best;}
function openInspect(p){const t=p.tok;let dna={};try{dna=JSON.parse(t.dna||'{}')}catch(e){}
  const pm=growthPM(Math.floor(Date.now()/1000)-(t.mint_ts||0));
  const short=a=>(a&&a.length>12)?a.slice(0,6)+'…'+a.slice(-4):a;
  inspectEl.innerHTML='<div class="ic"><div class="ih">'+(t.github||('#'+t.id))+' · #'+t.id+'</div>'
   +'<div class="ir"><span>species</span><b>'+SPN[((t.species%5)+5)%5]+'</b></div>'
   +'<div class="ir"><span>lang</span><b>'+(dna.lang||'—')+'</b></div>'
   +'<div class="ir"><span>archetype</span><b>'+(dna.archetype||'—')+'</b></div>'
   +'<div class="ir"><span>age</span><b>'+Math.floor(pm*170/1000)+' mo</b></div>'
   +'<div class="ir"><span>owner</span><b>'+short(t.owner)+'</b></div>'
   +'<div class="ir"><span>seed</span><b>'+t.seed+'</b></div>'
   +'<div class="il"><a href="/nft/?id='+t.id+'" target="_blank">open 3D NFT ↗</a>'
   +'<a href="https://explorer-bradbury.genlayer.com/address/'+CONTRACT+'" target="_blank">live on GenLayer explorer ↗</a></div>'
   +'<div class="ix">on-chain · GenLayer Bradbury · press E to close</div></div>';
  inspectEl.classList.add('on');inspectOpen=true;
}
function closeInspect(){inspectEl.classList.remove('on');inspectOpen=false;}
addEventListener('keydown',e=>{if(e.code==='KeyE'){const p=nearestToken();if(inspectOpen)closeInspect();else if(p)openInspect(p);}});
function updateInspectHint(){if(inspectOpen){ehintEl.classList.remove('on');return;}
  ehintEl.classList.toggle('on',!!(document.pointerLockElement===canvas&&nearestToken()));}
let last=performance.now();
function loop(){
  const now=performance.now(),dt=Math.min(0.05,(now-last)/1000);last=now;
  updateInspectHint();
  if(window.__updateAvatars)window.__updateAvatars(dt,now);
  if(window.__updateBillboard)window.__updateBillboard(now);
  if(window.__updateBillboard2)window.__updateBillboard2(now);
  if(document.pointerLockElement===canvas && !window.__typing){
    const spd=4.4*dt;let fx=0,fz=0;
    if(keys.KeyW||keys.ArrowUp)fz-=1; if(keys.KeyS||keys.ArrowDown)fz+=1;
    if(keys.KeyA||keys.ArrowLeft)fx-=1; if(keys.KeyD||keys.ArrowRight)fx+=1;
    if(fx||fz){const l=Math.hypot(fx,fz);fx/=l;fz/=l;const sinY=Math.sin(yaw),cosY=Math.cos(yaw);
      const dx=(fx*cosY+fz*sinY)*spd,dz=(-fx*sinY+fz*cosY)*spd;
      const nx=camera.position.x+dx,nz=camera.position.z+dz;
      if(!blocked(nx,camera.position.z))camera.position.x=nx;
      if(!blocked(camera.position.x,nz))camera.position.z=nz;}
  }
  dayNight(now);
  for(const c of clouds){c.g.position.x+=c.sp*dt;if(c.g.position.x>72)c.g.position.x=-72}
  for(const tr of livingTrees){tr.rotation.z=Math.sin(now*0.0007+tr.userData.sway)*0.018;tr.rotation.x=Math.cos(now*0.0006+tr.userData.sway)*0.012}
  water.material.color.setHSL(0.52,0.45,0.30+Math.sin(now*0.001)*0.05);
  updateLife(now,dt);
  const onB=onBridge(camera.position.x,camera.position.z);
  const fl=onB?bridgeDeckY(camera.position.x)+0.12:0;
  walkY+=(fl-walkY)*Math.min(1,dt*10);
  camera.position.y=walkY+EYE;
  camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;
  sun.target.position.set(camera.position.x,0,camera.position.z);
  if(CINE){const tt=now*0.00009,r=25;camera.position.set(Math.cos(tt)*r,6.5+Math.sin(tt*0.6)*2.2,Math.sin(tt)*r);camera.lookAt(0,2.2,0);}
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}
addEventListener('resize',resize);resize();loop();

/* ════════ STAGE 5: multiplayer (Supabase Realtime) ════════ */
if(!CINE) try {
  const SB_URL='https://cwmnpxbsrdaursrkwhrb.supabase.co';
  const SB_KEY='sb_publishable_kFeC7DTPgXDqL1qqQsAsAA_sE2gSZ7X';
  const meId=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():'u'+Math.random().toString(36).slice(2);
  let meName=''; try{meName=sessionStorage.getItem('cg_name')||''}catch(e){}
  if(!meName){meName='Builder-'+(1000+Math.floor(Math.random()*9000));try{sessionStorage.setItem('cg_name',meName)}catch(e){}}
  const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  // online chip (top-center, clear of the inspect panel)
  const card=document.createElement('div');card.id='online';
  card.innerHTML='<div class="o1"><span class="dot"></span><b id="onN">1</b>&nbsp;online</div><div class="o2"><b id="onM">'+(window.__minted||0)+'</b> / 1000 minted</div>';
  document.body.appendChild(card);
  const setOnline=n=>{const e=document.getElementById('onN');if(e&&n!=null)e.textContent=n;const m=document.getElementById('onM');if(m)m.textContent=(window.__minted||0);};
  setInterval(()=>setOnline(),2000);
  // chat log + input
  const log=document.createElement('div');log.style.cssText='position:fixed;left:16px;bottom:62px;z-index:6;width:340px;max-width:60vw;display:flex;flex-direction:column;gap:4px;pointer-events:none';document.body.appendChild(log);
  const input=document.createElement('input');input.maxLength=160;input.placeholder='press Enter to chat…';
  input.style.cssText='position:fixed;left:16px;bottom:18px;z-index:6;width:340px;max-width:60vw;background:#0b1118dd;border:1px solid #ffffff22;border-radius:8px;color:#eaf6ff;padding:9px 11px;font:13px "IBM Plex Mono",monospace;outline:none;opacity:.55';
  document.body.appendChild(input);
  function addMsg(name,text){const m=document.createElement('div');
    m.style.cssText='background:#0b1118cc;border:1px solid #ffffff14;border-radius:8px;padding:5px 9px;font:12px "IBM Plex Mono",monospace;color:#eaf6ff;align-self:flex-start;max-width:100%';
    m.innerHTML='<b style="color:#7ed957">'+esc(name)+'</b> '+esc(text);log.appendChild(m);while(log.children.length>8)log.removeChild(log.firstChild);}
  // peer avatars (voxel keepers)
  const avatars=new Map();
  const palIdx=id=>{let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))>>>0;return h%KEEPER_PAL.length;};
  function spawnAv(id){const K=buildKeeper(KEEPER_PAL[palIdx(id)]);scene.add(K.g);return Object.assign(K,{x:0,z:0,curYaw:0,phase:0,speed:0,tx:0,tz:0,faceYaw:0,moving:false,placed:false,last:performance.now()});}
  function onPeerPos(p){if(!p||p.id===meId)return;let a=avatars.get(p.id);if(!a){if(avatars.size>=24)return;a=spawnAv(p.id);avatars.set(p.id,a);}
    a.tx=+p.x||0;a.tz=+p.z||0;a.moving=!!p.moving;a.last=performance.now();if(!a.placed){a.x=a.tx;a.z=a.tz;a.placed=true;}}
  window.__updateAvatars=function(dt,now){for(const [id,a] of avatars){if(now-a.last>6000){scene.remove(a.g);avatars.delete(id);continue;}
    const k=Math.min(1,dt*9),dx=a.tx-a.x,dz=a.tz-a.z;a.x+=dx*k;a.z+=dz*k;
    a.speed+=((a.moving?2.6:0)-a.speed)*Math.min(1,dt*6);const mv=a.speed>0.2;
    if(Math.hypot(dx,dz)>0.02)a.faceYaw=-Math.atan2(dz,dx);
    if(mv)a.phase+=a.speed*dt*1.3;
    a.g.position.set(a.x,0,a.z);a.curYaw=angTo(a.curYaw,a.faceYaw,Math.min(1,dt*8));a.g.rotation.y=a.curYaw;
    const sw=mv?Math.sin(a.phase)*0.5:0;a.legs.L.rotation.z=sw;a.legs.R.rotation.z=-sw;a.arms.L.rotation.z=-sw*0.8;a.arms.R.rotation.z=sw*0.8;}};
  // realtime channel: presence (count) + pos + chat
  const sb=createClient(SB_URL,SB_KEY,{realtime:{params:{eventsPerSecond:16}}});
  const ch=sb.channel('genlayer-garden',{config:{presence:{key:meId},broadcast:{self:false}}});
  ch.on('broadcast',{event:'pos'},({payload})=>onPeerPos(payload));
  ch.on('broadcast',{event:'msg'},({payload})=>{if(payload)addMsg(payload.name||'someone',payload.text||'');});
  ch.on('presence',{event:'sync'},()=>{try{setOnline(Object.keys(ch.presenceState()).length);}catch(e){}});
  ch.subscribe(async s=>{if(s==='SUBSCRIBED'){try{await ch.track({name:meName,at:Date.now()});}catch(e){}}});
  let bx=1e9,bz=1e9;
  setInterval(()=>{if(document.pointerLockElement!==canvas)return;const x=camera.position.x,z=camera.position.z;const mv=Math.hypot(x-bx,z-bz)>0.02;bx=x;bz=z;
    ch.send({type:'broadcast',event:'pos',payload:{id:meId,name:meName,x,z,yaw,moving:mv}}).catch(()=>{});},120);
  input.addEventListener('focus',()=>{window.__typing=true;input.style.opacity='1';});
  input.addEventListener('blur',()=>{window.__typing=false;input.style.opacity='.55';});
  input.addEventListener('keydown',e=>{e.stopPropagation();
    if(e.code==='Enter'){const t=input.value.trim().slice(0,160);input.value='';if(t){addMsg(meName,t);ch.send({type:'broadcast',event:'msg',payload:{name:meName,text:t}}).catch(()=>{});}input.blur();}
    else if(e.code==='Escape'){input.value='';input.blur();}});
  addEventListener('keydown',e=>{if(e.code==='Enter'&&document.pointerLockElement===canvas&&!window.__typing){e.preventDefault();input.focus();}});
} catch(e){ console.warn('[multiplayer] disabled:', e); }
</script>
