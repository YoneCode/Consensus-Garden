[profile.default]
src = "src"
out = "out"
libs = ["lib"]
fs_permissions = [{ access = "read", path = "./ref" }]
gas_limit = "18446744073709551615"
memory_limit = 1073741824
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
